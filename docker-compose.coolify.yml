# Hardened Odoo 19 stack for a PERMANENT test/demo deployment (odoo.musqet.dev),
# deployed via Coolify on a VPS.
#
# It is NOT a real shop — test products only — but it is configured as a durable
# instance: TLS terminated at Coolify's proxy, secrets generated by Coolify,
# persistent volumes, and a locked-down single database.
#
# This is the DEPLOYMENT compose. For local development/testing use the plain
# docker-compose.yml instead. Full runbook: docs/DEPLOY-coolify.md
#
# Coolify "magic" variables used below:
#   SERVICE_FQDN_ODOO_8069   -> routes the app domain to this service:8069 over TLS
#   SERVICE_PASSWORD_POSTGRES-> a strong DB password Coolify generates on first deploy

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "odoo", "-d", "odoo"]
      interval: 10s
      timeout: 5s
      retries: 12

  odoo:
    image: odoo:19
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Coolify assigns the app domain here and routes it to container port 8069,
      # terminating Let's Encrypt TLS at its proxy. Set the FQDN to
      # https://odoo.musqet.dev in the Coolify UI (or as this var's value).
      - SERVICE_FQDN_ODOO_8069
      # DB connection. The odoo image's entrypoint turns these into
      # --db_host / --db_user / --db_password and appends them to the command below.
      - HOST=db
      - USER=odoo
      - PASSWORD=${SERVICE_PASSWORD_POSTGRES}
    # Non-secret production options. Effective command becomes:
    #   odoo <these flags> --db_host db --db_user odoo --db_password <generated>
    #   --proxy-mode        trust X-Forwarded-* from Coolify's proxy (REQUIRED behind it)
    #   --workers=0         threaded mode: serves HTTP + websocket on one port (8069),
    #                       so Coolify only has to route a single port. Bump to >=2 and
    #                       route /websocket to 8072 if this ever needs real throughput.
    #   --db-filter=^odoo$$ lock the instance to exactly the "odoo" database
    #   --no-database-list  disable the web database manager (no create/drop/backup UI)
    command: >
      odoo
      --proxy-mode
      --workers=0
      --database=odoo
      --db-filter=^odoo$$
      --without-demo=True
      --no-database-list
    volumes:
      - odoo-data:/var/lib/odoo
      - ./pos_musqet:/mnt/extra-addons/pos_musqet
    expose:
      - "8069"
    healthcheck:
      # App-agnostic: just confirm Odoo is listening. (Avoids failing before the
      # one-time DB init in docs/DEPLOY-coolify.md has created the "odoo" database.)
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('127.0.0.1', 8069), 5)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  odoo-db-data:
  odoo-data:
